openapi: 3.1.0
info:
  title: Temporal Phase Automation API
  version: 0.1.0
  description: >-
    API surface for orchestrating Speckit `tasks.md` automation workflows and
    retrieving phase execution results.
servers:
  - url: https://api.maverick.local
paths:
  /phase-automation/runs:
    post:
      summary: Start a new phase automation workflow run
      operationId: startPhaseAutomation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhaseRunRequest'
      responses:
        '202':
          description: Workflow accepted for execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhaseRunAccepted'
        '400':
          description: Validation error (missing tasks.md, invalid overrides)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /phase-automation/runs/{workflowId}:
    get:
      summary: Fetch aggregate status for a workflow run
      operationId: getPhaseAutomationStatus
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow status located
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhaseRunStatus'
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /phase-automation/runs/{workflowId}/phases/{phaseId}:
    get:
      summary: Retrieve machine-readable result for a specific phase
      operationId: getPhaseResult
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
        - name: phaseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Phase result located
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhaseResult'
        '404':
          description: Phase result not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PhaseRunRequest:
      type: object
      required:
        - repoPath
        - branch
        - tasksSource
      properties:
        repoPath:
          type: string
          description: Absolute path to repository root accessible to worker.
        branch:
          type: string
          description: Target branch name for modifications.
        tasksSource:
          oneOf:
            - type: object
              required:
                - path
              properties:
                path:
                  type: string
                  description: Absolute path to `tasks.md` on worker filesystem.
            - type: object
              required:
                - content
              properties:
                content:
                  type: string
                  description: Raw markdown content of `tasks.md`.
        aiDefaults:
          type: object
          required:
            - model
            - agentProfile
          properties:
            model:
              type: string
              description: Default AI model for phases.
            agentProfile:
              type: string
              description: Default agent persona.
        timeoutMinutes:
          type: integer
          minimum: 30
          default: 30
        retryPolicy:
          $ref: '#/components/schemas/RetryPolicy'
    PhaseRunAccepted:
      type: object
      required:
        - workflowId
        - runId
        - initialStatus
      properties:
        workflowId:
          type: string
        runId:
          type: string
        initialStatus:
          $ref: '#/components/schemas/PhaseRunStatus'
    PhaseRunStatus:
      type: object
      required:
        - workflowId
        - runId
        - status
        - completedPhases
        - pendingPhases
      properties:
        workflowId:
          type: string
        runId:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        completedPhases:
          type: array
          items:
            type: string
        pendingPhases:
          type: array
          items:
            type: string
        lastUpdatedAt:
          type: string
          format: date-time
        checkpoint:
          $ref: '#/components/schemas/WorkflowCheckpoint'
    PhaseResult:
      type: object
      required:
        - phaseId
        - status
        - completedTaskIds
        - timestamps
        - tasksMdHash
      properties:
        phaseId:
          type: string
        status:
          type: string
          enum: [success, failed, skipped]
        completedTaskIds:
          type: array
          items:
            type: string
        timestamps:
          type: object
          required:
            - startedAt
            - finishedAt
          properties:
            startedAt:
              type: string
              format: date-time
            finishedAt:
              type: string
              format: date-time
        durationMs:
          type: integer
        tasksMdHash:
          type: string
        stdoutPath:
          type: string
          nullable: true
        stderrPath:
          type: string
          nullable: true
        artifactPaths:
          type: array
          items:
            type: string
        summary:
          type: array
          items:
            type: string
        error:
          type: string
          nullable: true
    WorkflowCheckpoint:
      type: object
      required:
        - lastCompletedPhaseIndex
        - results
        - tasksMdHash
        - updatedAt
      properties:
        lastCompletedPhaseIndex:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/PhaseResult'
        tasksMdHash:
          type: string
        updatedAt:
          type: string
          format: date-time
    RetryPolicy:
      type: object
      required:
        - maximumAttempts
      properties:
        maximumAttempts:
          type: integer
          minimum: 1
        initialIntervalSeconds:
          type: integer
          minimum: 1
        maximumIntervalSeconds:
          type: integer
          minimum: 1
        nonRetriableErrors:
          type: array
          items:
            type: string
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
