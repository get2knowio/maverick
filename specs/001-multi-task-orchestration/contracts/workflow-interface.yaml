openapi: 3.0.3
info:
  title: Multi-Task Orchestration Workflow API
  description: |
    Temporal workflow interface for orchestrating sequential execution of multiple task files.
    This contract defines the input/output schemas for the workflow and its signals/queries.
  version: 1.0.0
  contact:
    name: Maverick Development Team

servers:
  - url: temporal://localhost:7233
    description: Local Temporal server

paths:
  /workflows/MultiTaskOrchestrationWorkflow:
    post:
      summary: Start Multi-Task Orchestration Workflow
      description: |
        Starts a new workflow execution to process multiple task files sequentially.
        Returns a workflow handle for monitoring and interaction.
      operationId: startOrchestrationWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestrationInput'
            examples:
              automated_batch:
                summary: Automated batch processing
                value:
                  task_file_paths:
                    - "tasks/feature-001.md"
                    - "tasks/feature-002.md"
                    - "tasks/feature-003.md"
                  interactive_mode: false
                  retry_limit: 3
                  repo_path: "/workspace/myrepo"
                  branch: "main"
                  default_model: "gpt-4"
                  default_agent_profile: null
              interactive_mode:
                summary: Interactive mode with approvals
                value:
                  task_file_paths:
                    - "tasks/feature-001.md"
                  interactive_mode: true
                  retry_limit: 5
                  repo_path: "/workspace/myrepo"
                  branch: "feature-branch"
                  default_model: "gpt-4-turbo"
                  default_agent_profile: "senior-developer"
      responses:
        '200':
          description: Workflow started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_id:
                    type: string
                    description: Unique workflow execution ID
                  run_id:
                    type: string
                    description: Unique run ID for this execution
        '400':
          description: Invalid input parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workflows/MultiTaskOrchestrationWorkflow/{workflowId}/result:
    get:
      summary: Get Workflow Result
      description: |
        Retrieves the final result of a completed workflow execution.
        Blocks until workflow completes if still running.
      operationId: getWorkflowResult
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
          description: Workflow execution ID
      responses:
        '200':
          description: Workflow result (completed or failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrationResult'
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workflows/MultiTaskOrchestrationWorkflow/{workflowId}/signals/continue_to_next_phase:
    post:
      summary: Send Continue Signal
      description: |
        Resumes workflow from a pause point (interactive mode only).
        Idempotent - multiple signals while paused have no additional effect.
      operationId: sendContinueSignal
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
          description: Workflow execution ID
      responses:
        '200':
          description: Signal sent successfully
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workflows/MultiTaskOrchestrationWorkflow/{workflowId}/signals/skip_current_task:
    post:
      summary: Send Skip Task Signal
      description: |
        Marks current task as skipped and moves to next task.
        Only effective when workflow is paused in interactive mode.
      operationId: sendSkipTaskSignal
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
          description: Workflow execution ID
      responses:
        '200':
          description: Signal sent successfully
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workflows/MultiTaskOrchestrationWorkflow/{workflowId}/queries/get_progress:
    get:
      summary: Query Workflow Progress
      description: |
        Retrieves current progress state without waiting for completion.
        Returns immediately with current snapshot.
      operationId: queryProgress
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
          description: Workflow execution ID
      responses:
        '200':
          description: Current progress state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressState'
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workflows/MultiTaskOrchestrationWorkflow/{workflowId}/queries/get_task_results:
    get:
      summary: Query Task Results
      description: |
        Retrieves all completed task results so far.
        Returns immediately with current results (may be partial if workflow still running).
      operationId: queryTaskResults
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
          description: Workflow execution ID
      responses:
        '200':
          description: List of completed task results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResult'
        '404':
          description: Workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    OrchestrationInput:
      type: object
      required:
        - task_file_paths
        - interactive_mode
        - retry_limit
        - repo_path
        - branch
      properties:
        task_file_paths:
          type: array
          items:
            type: string
          minItems: 1
          description: List of task file paths to process sequentially
          example:
            - "tasks/feature-001.md"
            - "tasks/feature-002.md"
        interactive_mode:
          type: boolean
          description: If true, pause after each phase for approval
          default: false
        retry_limit:
          type: integer
          minimum: 1
          maximum: 10
          description: Maximum retry attempts for phase execution
          default: 3
        repo_path:
          type: string
          minLength: 1
          description: Repository root path for task execution
          example: "/workspace/myrepo"
        branch:
          type: string
          minLength: 1
          description: Git branch name for all tasks (must be consistent)
          example: "main"
        default_model:
          type: string
          nullable: true
          description: Default AI model for phase execution
          example: "gpt-4"
        default_agent_profile:
          type: string
          nullable: true
          description: Default agent profile for phase execution
          example: "senior-developer"

    OrchestrationResult:
      type: object
      required:
        - total_tasks
        - successful_tasks
        - failed_tasks
        - skipped_tasks
        - unprocessed_tasks
        - task_results
        - unprocessed_task_paths
        - early_termination
        - total_duration_seconds
      properties:
        total_tasks:
          type: integer
          minimum: 0
          description: Total number of tasks in input
        successful_tasks:
          type: integer
          minimum: 0
          description: Count of tasks with status "success"
        failed_tasks:
          type: integer
          minimum: 0
          description: Count of tasks with status "failed"
        skipped_tasks:
          type: integer
          minimum: 0
          description: Count of tasks with status "skipped"
        unprocessed_tasks:
          type: integer
          minimum: 0
          description: Count of tasks not attempted (early termination)
        task_results:
          type: array
          items:
            $ref: '#/components/schemas/TaskResult'
          description: Results for each completed/failed/skipped task
        unprocessed_task_paths:
          type: array
          items:
            type: string
          description: Paths of tasks not attempted due to early termination
        early_termination:
          type: boolean
          description: True if workflow stopped due to task failure
        total_duration_seconds:
          type: integer
          minimum: 0
          description: Total workflow execution time in seconds

    TaskResult:
      type: object
      required:
        - task_file_path
        - overall_status
        - phase_results
        - total_duration_seconds
      properties:
        task_file_path:
          type: string
          minLength: 1
          description: Path to task file
        overall_status:
          type: string
          enum:
            - success
            - failed
            - skipped
            - unprocessed
          description: Final status after all phases
        phase_results:
          type: array
          items:
            $ref: '#/components/schemas/PhaseResult'
          description: Results for each phase executed
        total_duration_seconds:
          type: integer
          minimum: 0
          description: Total time for all phases in seconds
        failure_reason:
          type: string
          nullable: true
          description: Description if overall_status is "failed"

    PhaseResult:
      type: object
      required:
        - phase_name
        - status
        - duration_seconds
        - retry_count
      properties:
        phase_name:
          type: string
          minLength: 1
          description: Name of the phase executed
        status:
          type: string
          enum:
            - success
            - failed
          description: Execution outcome
        duration_seconds:
          type: integer
          minimum: 0
          description: Execution time in seconds
        error_message:
          type: string
          nullable: true
          description: Error description if status is "failed"
        retry_count:
          type: integer
          minimum: 0
          description: Number of retries attempted

    ProgressState:
      type: object
      required:
        - current_task_index
        - total_tasks
        - completed_tasks
        - is_paused
      properties:
        current_task_index:
          type: integer
          minimum: 0
          description: Zero-based index of current task
        total_tasks:
          type: integer
          minimum: 0
          description: Total number of tasks
        current_task_file:
          type: string
          nullable: true
          description: Path to current task file (null if completed)
        current_phase:
          type: string
          nullable: true
          description: Name of currently executing phase
        completed_tasks:
          type: array
          items:
            type: integer
          description: Indices of completed tasks
        is_paused:
          type: boolean
          description: True if workflow is waiting for signal
        waiting_for:
          type: string
          nullable: true
          description: Name of signal being waited for (if paused)

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          nullable: true
          description: Additional error context
