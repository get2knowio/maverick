name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
      - "!v*dev*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
